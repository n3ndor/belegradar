name: test

on:
  push:
    branches: [main]
    paths: ["extractor/**", ".github/workflows/test.yml"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install extractor
        working-directory: extractor
        run: pip install -e .[dev]
      - name: Unit tests (no network, no LLM)
        working-directory: extractor
        run: pytest -q
      - name: Samples regenerate deterministically
        working-directory: extractor
        run: |
          python samples/generate.py
          git diff --exit-code samples/
